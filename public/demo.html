<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
  <title>OpenInk — E-ink / Kindle demo</title>
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      background: #1a1a1a;
      font-family: Arial, Verdana, sans-serif;
      min-height: 100vh;
      padding: 16px;
    }
    .eink-device {
      background: #0d0d0d;
      border-radius: 12px;
      padding: 16px;
      margin: 0 auto 16px;
      max-width: 100%;
    }
    .eink-screen-wrap {
      position: relative;
      display: block;
      margin: 0 auto;
    }
    .eink-screen {
      position: relative;
      background: #e8e6e3;
      border-radius: 8px;
      overflow: hidden;
      width: 412px;
      max-width: 100%;
      height: 549px;
    }
    .eink-screen iframe {
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      width: 100%;
      height: 100%;
      border: none;
      filter: grayscale(1) contrast(1.05);
    }
    .eink-refresh {
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      pointer-events: none;
      background: #0a0a0a;
      opacity: 0;
      z-index: 2;
    }
    .eink-bleed {
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      pointer-events: none;
      background: #0a0a0a;
      opacity: 0;
      z-index: 1;
    }
    .eink-label {
      color: #999;
      font-size: 12px;
      margin: 8px 0 0;
      text-align: center;
    }
    .eink-controls {
      padding: 12px 16px;
      background: #252525;
      border-radius: 8px;
      color: #999;
      font-size: 13px;
      max-width: 100%;
      margin: 0 auto;
    }
    .eink-controls .control-row {
      margin-bottom: 12px;
    }
    .eink-controls .control-row:last-child { margin-bottom: 0; }
    .eink-controls label { display: block; }
    .eink-controls input[type="range"] { width: 120px; }
    .eink-back {
      display: inline-block;
      margin-bottom: 16px;
      color: #ccc;
      font-size: 14px;
    }
    .eink-back a { color: #8af; }
    @media (max-width: 480px) {
      .eink-screen { height: 70vh; min-height: 360px; }
    }
  </style>
</head>
<body>
  <p class="eink-back"><a href="/legacy.html">← Back to OpenInk</a></p>
  <div class="eink-device">
    <div class="eink-screen-wrap">
      <div class="eink-screen" id="screen">
        <iframe id="app" src="/legacy.html" title="OpenInk (Kindle)"></iframe>
        <div class="eink-refresh" id="refresh" aria-hidden="true"></div>
        <div class="eink-bleed" id="bleed" aria-hidden="true"></div>
      </div>
    </div>
    <p class="eink-label">Kindle 6.8″ (412×549 px)</p>
  </div>
  <div class="eink-controls">
    <div class="control-row">
      <label>
        Refresh duration (ms): <span id="durationVal">400</span><br />
        <input type="range" id="duration" min="300" max="600" value="400" step="50" />
      </label>
    </div>
    <div class="control-row">
      <label><input type="checkbox" id="autoRefresh" /> Auto-refresh every 3s</label>
    </div>
  </div>

  <script>
    (function () {
      // --- Kindle dimensions (Paperwhite 11th gen 1236×1648, scaled 1/3 for demo) ---
      var SCREEN_WIDTH = 412;
      var SCREEN_HEIGHT = 549;
      var REFRESH_NAV_COUNT = 3;
      var REFRESH_DURATION_MS = 400;
      var BLEED_OPACITY = 0.06;
      var BLEED_FADE_MS = 180;
      var FADE_IN_MS = 120;
      var FADE_OUT_MS = 280;
      var AUTO_REFRESH_INTERVAL_MS = 3000;

      var screenEl = document.getElementById('screen');
      var iframe = document.getElementById('app');
      var overlay = document.getElementById('refresh');
      var bleedEl = document.getElementById('bleed');
      var durationInput = document.getElementById('duration');
      var durationVal = document.getElementById('durationVal');
      var autoRefreshCheck = document.getElementById('autoRefresh');

      var autoTimer = null;
      var navClickCount = 0;

      screenEl.style.width = SCREEN_WIDTH + 'px';
      screenEl.style.height = SCREEN_HEIGHT + 'px';

      function getDuration() {
        return Number(durationInput.value) || REFRESH_DURATION_MS;
      }

      function runRefresh() {
        var ms = getDuration();
        var holdBlack = Math.max(0, ms - FADE_IN_MS - FADE_OUT_MS);

        overlay.style.transition = 'none';
        overlay.style.opacity = '0';
        bleedEl.style.transition = 'none';
        bleedEl.style.opacity = '0';
        overlay.offsetHeight;

        overlay.style.transition = 'opacity ' + (FADE_IN_MS / 1000) + 's ease-out';
        overlay.style.opacity = '1';

        setTimeout(function () {
          overlay.style.transition = 'opacity ' + (FADE_OUT_MS / 1000) + 's ease-in';
          overlay.style.opacity = '0';
        }, FADE_IN_MS + holdBlack);

        setTimeout(function () {
          bleedEl.style.opacity = '0';
          bleedEl.style.transition = 'opacity ' + (BLEED_FADE_MS / 1000) + 's ease-out';
          bleedEl.style.opacity = String(BLEED_OPACITY);
          bleedEl.offsetHeight;
          bleedEl.style.opacity = '0';
        }, FADE_IN_MS + holdBlack + FADE_OUT_MS);
      }

      window.addEventListener('message', function (e) {
        if (e.data && e.data.type === 'openink-refresh') {
          navClickCount++;
          if (navClickCount >= REFRESH_NAV_COUNT) {
            runRefresh();
            navClickCount = 0;
          }
        }
      });

      durationInput.addEventListener('input', function () {
        durationVal.textContent = durationInput.value;
      });

      autoRefreshCheck.addEventListener('change', function () {
        clearInterval(autoTimer);
        if (autoRefreshCheck.checked) {
          autoTimer = setInterval(runRefresh, AUTO_REFRESH_INTERVAL_MS);
        }
      });

      iframe.addEventListener('load', function () {
        try {
          iframe.contentWindow.postMessage({ type: 'openink-demo-ready' }, '*');
        } catch (err) {}
      });
    })();
  </script>
</body>
</html>
