<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
    <meta name="theme-color" content="#ffffff" />
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data: https:; connect-src 'self' https://corsproxy.io https://api.coingecko.com https://nominatim.openstreetmap.org https://api.open-meteo.com https://geocoding-api.open-meteo.com https://api.dictionaryapi.dev; font-src 'self'; frame-ancestors 'self'; base-uri 'self'; form-action 'self'" />
    <meta http-equiv="X-Content-Type-Options" content="nosniff" />
    <meta name="referrer" content="strict-origin-when-cross-origin" />
    <link rel="icon" type="image/svg+xml" href="/openink-logo.svg" />
    <link rel="manifest" href="/manifest.json" />
    <title>OpenInk</title>
  </head>
  <body>
    <script>
      (function() {
        var ua = typeof navigator !== 'undefined' && navigator.userAgent || '';
        if (/\b(Kindle|Silk|Oasis)\b/i.test(ua)) {
          document.body.innerHTML = '<div style="padding:1.5rem;font-family:system-ui,sans-serif;font-size:1rem;line-height:1.5;max-width:28em;margin:0 auto;"><h2 style="font-size:1.25rem;margin:0 0 0.75rem;">Unsupported browser</h2><p style="margin:0 0 0.5rem;">OpenInk does not run on this device or browser (e.g. Kindle).</p><p style="margin:0;">Open this site on a phone or computer for the full app.</p></div>';
          document.title = 'OpenInk – Unsupported browser';
          return;
        }
      })();
    </script>
    <div id="root"></div>
    <noscript><p style="padding:1rem;font-family:system-ui,sans-serif;">OpenInk needs JavaScript. Please enable it or use a supported browser.</p></noscript>
    <script>
      setTimeout(function() {
        var root = document.getElementById('root');
        if (root && root.children.length === 0) {
          root.innerHTML = '<div style="padding:1.5rem;font-family:system-ui,sans-serif;font-size:1rem;line-height:1.5;max-width:28em;margin:0 auto;"><h2 style="font-size:1.25rem;margin:0 0 0.75rem;">Unsupported browser</h2><p style="margin:0 0 0.5rem;">OpenInk does not run on this device or browser.</p><p style="margin:0;">Open this site on a phone or computer for the full app.</p></div>';
        }
      }, 8000);
    </script>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
